name: sightsync
description: "SightSync – Your smart Bluetooth onboarding companion."
publish_to: "none"

version: 1.0.1+2

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_blue_plus: 1.32.12
  provider: ^6.1.2
  sqflite: ^2.3.3+1
  path: ^1.9.0
  permission_handler: ^12.0.1
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  app_links: ^7.0.0
  flutter_mjpeg: ^2.0.4
  http: ^0.13.6
  flutter_tts: ^4.2.3
  shared_preferences: ^2.5.5
  firebase_remote_config: ^6.3.0
  google_generative_ai: ^0.4.7
  google_mlkit_text_recognition: any
  google_mlkit_image_labeling: any
  google_mlkit_object_detection: any
  connectivity_plus: ^7.1.0

dependency_overrides:
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true
  assets:
    - assets/images/
